<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EDISCA: Uma aventura educativa pelos caminhos da EDISCA.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --dark: #292f36;
            --light: #f7fff7;
            --accent: #ffe66d;
            --ui-bg: rgba(32, 38, 46, 0.88);
            --ui-border: #ffe66d;
            --font-head: 'Baloo 2', 'Courier New', sans-serif;
            --font-body: 'Nunito', 'Courier New', sans-serif;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            user-select: none; -webkit-user-select: none;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-body);
            background-color: #142018; color: var(--light);
        }

        #game-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        canvas {
            display: block; image-rendering: auto;
        }

        /* UI e Modais */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; overflow: hidden;
            background:
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 35%),
                linear-gradient(180deg, #7fe3d4 0%, #4ecdc4 35%, #2a9d8f 65%, #21665c 100%);
            transition: opacity 0.5s;
        }
        .screen::before, .screen::after {
            content: ""; position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.35); filter: blur(1px);
            animation: floatCloud 22s linear infinite;
        }
        .screen::before { width: 140px; height: 40px; top: 14%; left: -20%; box-shadow: 60px 20px 0 -5px rgba(255,255,255,0.25), 110px -5px 0 -8px rgba(255,255,255,0.3); }
        .screen::after { width: 100px; height: 32px; top: 65%; left: -25%; animation-duration: 30s; animation-delay: 4s; box-shadow: 50px 15px 0 -6px rgba(255,255,255,0.2); }
        @keyframes floatCloud { from { transform: translateX(0); } to { transform: translateX(160vw); } }

        h1 {
            font-family: var(--font-head); font-weight: 800;
            font-size: 4rem; color: var(--accent);
            text-shadow: 3px 3px 0px var(--primary), 6px 6px 0px var(--dark), 0 10px 25px rgba(0,0,0,0.35);
            margin-bottom: 6px; text-align: center; letter-spacing: 1px;
        }
        h2 {
            font-family: var(--font-head); font-weight: 700;
            font-size: 1.4rem; background: linear-gradient(135deg, var(--primary), #ff8e8e);
            padding: 6px 18px; border-radius: 30px; border: 3px solid var(--dark);
            margin-bottom: 22px; text-align: center; box-shadow: 0 4px 0 var(--dark);
        }

        .form-card {
            background: var(--ui-bg); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            border: 4px solid var(--ui-border); border-radius: 22px;
            padding: 34px 30px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 16px 40px rgba(0,0,0,0.45), inset 0 0 0 2px rgba(255,255,255,0.06);
            position: relative; z-index: 1;
        }

        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 10px; border: 3px solid var(--secondary);
            font-size: 1.2rem; font-weight: 800; text-align: center; margin-bottom: 20px; outline: none;
            font-family: var(--font-body); background: #fff; color: var(--dark);
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(255,230,109,0.35); }

        .game-btn {
            background: linear-gradient(180deg, #ff8a8a, var(--primary)); color: var(--light); border: 3px solid var(--dark);
            padding: 13px 26px; font-size: 1.15rem; font-weight: 800; border-radius: 14px;
            cursor: pointer; box-shadow: 0 5px 0px var(--dark), 0 8px 18px rgba(0,0,0,0.3); text-transform: uppercase;
            font-family: var(--font-head); letter-spacing: 0.5px; transition: transform 0.08s, box-shadow 0.08s, filter 0.15s;
        }
        .game-btn:hover { filter: brightness(1.08); }
        .game-btn:active { transform: translate(0, 5px); box-shadow: 0px 0px 0px var(--dark); }

        /* HUD Principal */
        #hud {
            position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 10px; z-index: 5; pointer-events: none;
        }

        .hud-panel {
            background: var(--ui-bg); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            border: 3px solid var(--ui-border); border-radius: 14px;
            padding: 10px 16px; display: inline-flex; align-items: center; gap: 10px;
            font-family: var(--font-head); box-shadow: 0 6px 16px rgba(0,0,0,0.35);
        }

        .hud-medals { display: flex; flex-wrap: wrap; gap: 6px; max-width: 320px; }
        .medal-icon {
            width: 30px; height: 30px; background: rgba(255,255,255,0.08); border: 2px dashed rgba(255,255,255,0.35);
            border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.95rem; opacity: 0.55;
            transition: transform 0.25s, opacity 0.25s;
        }
        .medal-icon.active {
            opacity: 1; border: 2px solid var(--accent); background: radial-gradient(circle, #fff4b8 0%, #fca311 100%);
            box-shadow: 0 0 12px var(--accent), 0 0 0 3px rgba(255,230,109,0.25);
            animation: medalPop 0.5s ease;
        }
        @keyframes medalPop { 0% { transform: scale(0.3) rotate(-15deg); } 60% { transform: scale(1.25) rotate(6deg); } 100% { transform: scale(1) rotate(0); } }

        #tutorial-hud {
            position: absolute; top: 10px; right: 10px; background: var(--ui-bg);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            border: 2px solid var(--secondary); padding: 12px 16px; border-radius: 14px;
            color: #fff; font-size: 0.9rem; text-align: right; z-index: 5;
            box-shadow: 0 6px 16px rgba(0,0,0,0.35); line-height: 1.5;
        }

        /* Diálogos */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,15,12,0.72); backdrop-filter: blur(2px);
            display: none; justify-content: center; align-items: center; z-index: 20;
        }
        .dialog-box {
            background: var(--ui-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 4px solid var(--ui-border); border-radius: 22px;
            width: 90%; max-width: 700px; max-height: 90vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden;
        }
        .dialog-header { background: linear-gradient(135deg, var(--dark), #1b2026); padding: 16px 18px; display: flex; align-items: center; gap: 15px; border-bottom: 3px solid var(--ui-border); }
        .dialog-avatar { width: 60px; height: 60px; background: radial-gradient(circle at 35% 30%, #ff9a9a, var(--primary)); border: 3px solid var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; box-shadow: 0 0 0 4px rgba(255,230,109,0.2); }
        .dialog-body { padding: 26px; font-size: 1.08rem; line-height: 1.65; overflow-y: auto; font-family: var(--font-body); font-weight: 600; }
        .dialog-footer { padding: 16px; background: rgba(0,0,0,0.25); display: flex; justify-content: flex-end; gap: 10px; border-top: 2px solid rgba(255,255,255,0.08); }
        .option-btn { background: rgba(255,255,255,0.04); border: 2px solid var(--secondary); color: var(--light); padding: 13px 16px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; text-align: left; font-size: 1rem; width: 100%; font-family: var(--font-body); font-weight: 700; transition: background 0.15s, color 0.15s, transform 0.1s; border-left-width: 6px;}
        .option-btn:hover { background: var(--secondary); color: var(--dark); transform: translateX(3px); }

        #interaction-prompt {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--ui-bg); backdrop-filter: blur(6px); border: 3px solid var(--primary); padding: 10px 22px;
            border-radius: 24px; font-weight: 800; font-family: var(--font-head); display: none; z-index: 5; animation: pulse 1s infinite;
            box-shadow: 0 6px 16px rgba(0,0,0,0.4);
        }
        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } }

        /* Controles Virtuais */
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 5; pointer-events: none; }
        .dpad, .action-pad { pointer-events: auto; }
        .dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); gap: 5px; }
        .ctrl-btn { background: rgba(20,25,20,0.55); backdrop-filter: blur(3px); border: 3px solid rgba(255,255,255,0.75); border-radius: 12px; color: white; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.35); }
        .btn-up { grid-column: 2; grid-row: 1; } .btn-left { grid-column: 1; grid-row: 2; } .btn-down { grid-column: 2; grid-row: 3; } .btn-right { grid-column: 3; grid-row: 2; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(180deg, #ff8a8a, var(--primary)); border: 4px solid var(--accent); color: var(--dark); font-weight: 800; font-family: var(--font-head); display: flex; justify-content: center; align-items: center; align-self: flex-end; margin-bottom: 15px; box-shadow: 0 6px 14px rgba(0,0,0,0.4); }
        @media (min-width: 800px) { #controls { display: none; } }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="start-screen" class="screen">
        <h1>EDISCA</h1>
        <h2>Uma aventura educativa pelos caminhos da EDISCA.</h2>
        <div class="form-card">
            <p style="margin-bottom: 15px; color: var(--accent);">Identifique-se, educando(a):</p>
            <input type="text" id="player-name" value="Bailarino(a)" maxlength="15">
            <button class="game-btn" onclick="startGame()">Iniciar</button>
        </div>
    </div>

    <div id="hud" style="display: none;">
        <div class="hud-panel">
            <strong id="hud-name" style="color: var(--accent);">Jogador</strong>
            <span id="hud-score" style="margin-left: 10px;">⭐ 0</span>
        </div>
        <div class="hud-panel hud-medals" id="medals-container"></div>
    </div>

    <div id="tutorial-hud" style="display: none;">
        ⌨️ <b>WASD / Setas</b> para Andar<br>
        🔘 <b>Espaço</b> para Falar/Interagir
    </div>

    <div id="interaction-prompt">Aperte ESPAÇO para falar</div>

    <div id="controls" style="display: none;">
        <div class="dpad">
            <div class="ctrl-btn btn-up" id="btn-up">▲</div>
            <div class="ctrl-btn btn-left" id="btn-left">◀</div>
            <div class="ctrl-btn btn-right" id="btn-right">▶</div>
            <div class="ctrl-btn btn-down" id="btn-down">▼</div>
        </div>
        <div class="action-pad">
            <div class="action-btn" id="btn-action">AÇÃO</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="dialog-overlay" class="modal-overlay">
        <div class="dialog-box">
            <div class="dialog-header">
                <div class="dialog-avatar" id="dialog-icon">👤</div>
                <div>
                    <div id="dialog-npc" style="font-weight: bold; color: var(--accent); font-size: 1.2rem;">NPC</div>
                    <div id="dialog-room" style="font-size: 0.9rem; opacity: 0.8;">Sala</div>
                </div>
            </div>
            <div class="dialog-body" id="dialog-content"></div>
            <div class="dialog-footer" id="dialog-actions"></div>
        </div>
    </div>
</div>

<script>
    // ==========================================================================
    // 1. MOTOR DO JOGO
    // ==========================================================================
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const TILE = 40;
    const COLS = 70;
    const ROWS = 65;
    const MAP_W = COLS * TILE;
    const MAP_H = ROWS * TILE;
    let map = [];
    let camX = 0, camY = 0;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ==========================================================================
    // 2. GERAÇÃO DO MAPA
    // ==========================================================================
    function initMap() {
        for (let r = 0; r < ROWS; r++) {
            map[r] = [];
            for (let c = 0; c < COLS; c++) {
                if (r < 2 || r > ROWS-3 || c < 2 || c > COLS-3) map[r][c] = 4; // Água
                else map[r][c] = 0; // Grama
            }
        }

        const build = (r1, r2, c1, c2) => {
            for (let r = r1; r <= r2; r++) {
                for (let c = c1; c <= c2; c++) {
                    map[r][c] = (r===r1 || r===r2 || c===c1 || c===c2) ? 1 : 3;
                }
            }
            map[r2][Math.floor((c1+c2)/2)] = 3; map[r2][Math.floor((c1+c2)/2)-1] = 3; 
        };

        build(5, 12, 30, 40); // Portaria
        build(17, 24, 10, 20); // Secretaria
        build(17, 24, 50, 60); // Diretoria
        build(29, 36, 10, 20); // Cozinha
        build(29, 36, 50, 60); // Reforço
        build(41, 48, 10, 20); // Financeiro
        build(41, 48, 50, 60); // Artes
        
        // Novas salas adicionadas de forma simétrica ao redor do caminho central
        build(17, 24, 22, 29); // TI
        build(17, 24, 41, 48); // Brechó "Segundo Ato"
        build(29, 36, 22, 29); // Comunicação e Marketing
        build(29, 36, 41, 48); // Refeitório

        build(53, 60, 20, 30); // Dança
        build(53, 60, 40, 50); // Teatro/Espetáculo
        build(53, 60, 5, 15);  // Saúde
        build(53, 60, 55, 65); // Biblioteca
        
        // Jardim com abertura (Área de Manutenção)
        build(58, 62, 32, 38);
        map[58][34] = 0; map[58][35] = 2; map[58][36] = 2; 

        // Caminhos Principais
        for(let r=12; r<58; r++) {
            for(let c=32; c<=38; c++) map[r][c] = 2;
        }
        for(let c=20; c<50; c++) {
            for(let r=25; r<=27; r++) map[r][c] = 2; 
            for(let r=37; r<=39; r++) map[r][c] = 2; 
            for(let r=49; r<=51; r++) map[r][c] = 2; 
        }
    }

    // ==========================================================================
    // 3. DESAFIOS (Focados na Rotina da EDISCA)
    // ==========================================================================
    const questsData = {
        portaria: { room: "Portaria", npcs: ["Prof. Junior", "Prof. Cris"], icon: "🚪",
            intro: "Bem-vindos à portaria da EDISCA! Somos o Professor Junior e o Professor Cris. Nosso trabalho é garantir a segurança e o acesso correto de todos. Vamos testar sua lógica de organização?",
            questions: [
               { q: "Na entrada da EDISCA, quatro educandos chegaram à portaria. Sofia entrou antes de Miguel. Ana entrou depois de Miguel, mas antes de Lucas. Quem foi o terceiro a passar pela catraca?",
  opts: ["Sofia", "Miguel", "Ana", "Lucas"],
  ans: 2,
  exp: "A ordem correta é: Sofia → Miguel → Ana → Lucas. Portanto, a terceira pessoa a passar pela catraca foi Ana." },
              { q: "A equipe da portaria precisa localizar um educando. Eles sabem apenas que ele não está na recepção, nem na biblioteca, e que ainda não foi para o refeitório. Em qual lugar ele provavelmente está?",
  opts: ["Sala de aula", "Recepção", "Biblioteca", "Refeitório"],
  ans: 0,
  exp: "Como os outros locais já foram descartados, a única possibilidade restante é que ele esteja na sala de aula." },                { q: "O ensaio termina às 17h30. Os pais começam a chegar 15 minutos antes. A que horas a portaria deve organizar a área de espera?", opts: ["17h00", "17h15", "17h30", "17h45"], ans: 1, exp: "Se eles chegam 15 minutos antes das 17h30, a recepção deve estar pronta às 17h15." },
                { q: "Por que não podemos deixar as portas principais totalmente abertas sem monitoramento durante as aulas?", opts: ["Para o ar condicionado não vazar", "Por medidas rigorosas de proteção aos educandos", "Para não entrar poeira", "Porque a porta quebra"], ans: 1, exp: "A prioridade número um da portaria é a segurança física de todos os alunos e funcionários." },
               { q: "Na entrada da EDISCA há quatro mochilas esquecidas. Uma é azul, uma verde, uma vermelha e uma amarela. Sabe-se que: a mochila azul não é de quem chegou primeiro; a vermelha pertence a alguém que chegou antes do dono da verde; a amarela foi a última a ser identificada. Qual mochila certamente não foi a primeira a chegar?",
  opts: ["Azul", "Verde", "Vermelha", "Amarela"],
  ans: 0,
  exp: "O enunciado informa diretamente que a mochila azul não pertence a quem chegou primeiro." }
            ]},
        secretaria: { room: "Secretaria", npcs: ["Profª Gesliane"], icon: "🗂️",
            intro: "Oi, aqui é a Professora Gesliane! Cuidamos de toda a documentação, presenças e matrículas para que vocês possam estudar em paz. Me ajude com a rotina administrativa!",
            questions: [
                { q: "Temos 100 pastas de alunos e precisamos organizá-las em ordem alfabética. A pasta da 'Ana' e do 'Bruno' já estão no lugar. Onde entra a pasta da 'Beatriz'?", opts: ["Antes da Ana", "Depois do Bruno", "Entre Ana e Bruno", "No final"], ans: 2, exp: "Na ordem alfabética, 'Beatriz' (Be) vem depois de 'Ana' (An) e antes de 'Bruno' (Br)." },
                { q: "Para manter a bolsa, o aluno precisa de 75% de presença. Se o mês tem 20 aulas, qual é o número MÁXIMO de faltas que ele pode ter?", opts: ["3 faltas", "5 faltas", "7 faltas", "10 faltas"], ans: 1, exp: "75% de 20 é 15 aulas. Portanto, ele pode faltar no máximo 5 vezes (20 - 15 = 5)." },
                { q: "Um edital exige RG, CPF e Comprovante de Residência de cada aluno. Se vamos matricular 30 novos educandos, quantos documentos, no total, a secretaria precisará arquivar?", opts: ["30", "60", "90", "120"], ans: 2, exp: "São 3 documentos por aluno. 30 alunos x 3 = 90 documentos processados com muito cuidado!" },
                { q: "Se um pai liga perguntando sobre o calendário de férias, qual documento a secretaria consulta para dar a informação exata?", opts: ["Livro de presenças", "Calendário letivo institucional", "Lista de materiais", "O cardápio da cozinha"], ans: 1, exp: "O calendário letivo é o documento oficial que rege todas as datas da instituição." },
                { q: "A atualização de dados cadastrais ocorre a cada semestre. Se estamos em fevereiro, a próxima atualização será em:", opts: ["Março", "Agosto", "Dezembro", "Outubro"], ans: 1, exp: "Um semestre tem 6 meses. Fevereiro (mês 2) + 6 meses = Agosto (mês 8)." }
            ]},
        diretoria: { room: "Diretoria", npcs: ["Profª Andrea", "Profª Claudia", "Dirª Dora", "Profª Amanda"], icon: "🏢",
            intro: "Olá! Somos Andrea, Claudia, Dora e Amanda. Como líderes da instituição, planejamos o futuro da EDISCA, buscamos parcerias e mantemos nossos projetos vivos. Vamos testar sua visão estratégica?",
            questions: [
                { q: "A EDISCA precisa planejar um novo espetáculo. Qual a sequência lógica de planejamento?", opts: ["Ensaiar > Apresentar > Captar Recursos", "Captar Recursos > Criar > Ensaiar > Apresentar", "Apresentar > Criar > Captar Recursos", "Criar > Apresentar > Ensaiar"], ans: 1, exp: "Sem recursos e sem criação, não há ensaio. E o espetáculo é a etapa final de todo esse esforço." },
                { q: "Para garantir que a escola continue funcionando por anos, a diretoria prioriza:", opts: ["Gastar todo o recurso em um único evento", "Sustentabilidade financeira e planejamento a longo prazo", "Fazer apenas reuniões sem ação", "Não ter parceiros"], ans: 1, exp: "A sustentabilidade garante que as futuras gerações de alunos também tenham as mesmas oportunidades." },
                { q: "Temos uma reunião com 3 possíveis patrocinadores. Cada um exige um relatório de impacto social diferente. Quantos relatórios precisamos preparar?", opts: ["1 geral", "Nenhum", "3 personalizados", "10"], ans: 2, exp: "Se cada um exige um formato diferente, devemos honrar o compromisso preparando 3 relatórios específicos." },
                { q: "A missão da EDISCA envolve arte e educação. Se tivermos que cortar custos, qual área NÃO pode ser comprometida?", opts: ["O desenvolvimento e bem-estar dos educandos", "A pintura externa do muro", "Decorações de escritório", "Troca de móveis da diretoria"], ans: 0, exp: "Vocês, educandos, são o coração do nosso projeto. O investimento no bem-estar de vocês é intocável." },
                { q: "Se um projeto social dura 2 anos e é avaliado trimestralmente. Quantas avaliações a diretoria fará até o fim do projeto?", opts: ["4", "6", "8", "12"], ans: 2, exp: "Cada ano tem 4 trimestres. Em 2 anos, são 8 avaliações para garantir o sucesso do projeto." }
            ]},
        cozinha: { room: "Cozinha", npcs: ["Profª Aurea", "Profª Daiane"], icon: "🍳",
            intro: "Cheirinho de comida boa! Somos as Professoras Aurea e Daiane. Preparamos a alimentação nutritiva que dá energia para vocês dançarem. Vamos calcular nossa rotina?",
            questions: [
               { q: "Na cozinha, as bandejas recebem etiquetas nesta sequência: A, B, C, A, B, C, A... Qual letra aparecerá na 11ª bandeja?",
  opts: [
    "A",
    "B",
    "C",
    "D"
  ],
  ans: 1,
  exp: "A sequência se repete a cada três bandejas. A 11ª posição corresponde à letra B." },
                { q: "A distribuição da refeição exige higiene rigorosa. Qual a ordem correta antes de servir?", opts: ["Servir > Lavar as mãos > Cozinhar", "Lavar as mãos > Colocar touca > Cozinhar > Servir", "Cozinhar > Comer > Servir", "Lavar os alimentos depois de picar"], ans: 1, exp: "A higienização (mãos e cabelo) é o primeiro passo para garantir a segurança alimentar de todos." },
               { q: "As frutas precisam ser organizadas em ordem alfabética. Qual sequência está correta?",
  opts: [

  ],
  ans: 0,
  exp: "Em ordem alfabética: Banana, Maçã, Melancia e Pera." },
                { q: "Na cozinha, quatro recipientes estão identificados como Açúcar, Sal, Farinha e Arroz. Sabe-se que apenas um rótulo está correto. Ao abrir o recipiente escrito 'Sal', você encontra farinha. Qual rótulo certamente está errado?", opts: ["Açúcar", "Sal", "Farinha", "Arroz"], ans: 1, exp: "Como o recipiente identificado como 'Sal' contém farinha, esse rótulo certamente está errado." },
                { q: "Por que o cardápio da EDISCA é planejado semanas antes?", opts: ["Para comprar os ingredientes com antecedência e garantir o valor nutricional", "Porque é mais fácil cozinhar qualquer coisa na hora", "Para esconder a comida", "Para fazer sempre a mesma comida"], ans: 0, exp: "Planejamento garante economia na compra e refeições balanceadas para a saúde de vocês." }
            ]},
        financeiro: { room: "Financeiro", npcs: ["Profª Clecia", "Profª Vanessa", "Profª Flaviane"], icon: "💰",
            intro: "Bem-vindos ao coração financeiro da escola! Somos as Professoras Clecia, Vanessa e Flaviane. Cuidamos para que o dinheiro doado se transforme em arte e estrutura. Calcule conosco:",
            questions: [
                { q: "Recebemos uma doação de R$ 1.000,00. Precisamos comprar 10 figurinos que custam R$ 80,00 cada. Quanto sobrará no caixa da escola?", opts: ["R$ 100,00", "R$ 200,00", "R$ 300,00", "Não sobra nada"], ans: 1, exp: "10 x 80 = 800. 1000 - 800 = R$ 200,00 de saldo positivo para a instituição!" },
                { q: "O pagamento da conta de luz vence dia 10. Hoje é dia 5 e o banco demora 2 dias úteis para compensar. Qual o raciocínio financeiro correto?", opts: ["Pagar no dia 15", "Pagar hoje para garantir que compense antes do vencimento", "Ignorar o vencimento", "Pagar no dia 10 e arriscar juros"], ans: 1, exp: "Pagamentos antecipados evitam multas por atraso e protegem os recursos da ONG." },
                { q: "Precisamos cotar preços de tecidos. O Fornecedor A vende por 50,00 e frete 20,00. O Fornecedor B vende por 60,00 com frete grátis. Qual é o mais barato no total?", opts: ["Fornecedor A", "Fornecedor B", "São iguais", "Depende do tecido"], ans: 1, exp: "Fornecedor A (50+20 = 70). Fornecedor B (60+0 = 60). Logo, o B é mais econômico para a escola." },
                { q: "A manutenção da escola custa dinheiro. Se um aluno deixa a torneira aberta, o que acontece com os recursos?", opts: ["Nada", "A água é de graça", "Aumenta a conta, tirando dinheiro que poderia ir para o lanche ou figurinos", "O financeiro não paga água"], ans: 2, exp: "Todos os custos são conectados. Desperdiçar recursos físicos é jogar fora recursos financeiros que beneficiariam vocês mesmos." },
                { q: "Para aprovar uma despesa, precisamos de 3 assinaturas da diretoria. Se já temos a da Profª Andrea e da Profª Claudia, o que falta?", opts: ["Aprovação do porteiro", "A assinatura da Dirª Dora", "Comprar e assinar depois", "Nenhuma"], ans: 1, exp: "O processo exige a aprovação do trio de diretoria para total transparência institucional." }
            ]},
        reforco: { room: "Reforço Escolar", npcs: ["Prof. Rogério"], icon: "📐",
            intro: "E aí! Sou o Professor Rogério. Sem estudo não há arte completa. Nosso reforço garante que vocês brilhem na escola regular também. Vamos aos desafios!",
            questions: [
                { q: "Na sala de reforço, quatro alunos fizeram atividades diferentes: leitura, escrita, cálculo e lógica. Sabe-se que Ana Luiza não fez cálculo, Hellen fez lógica e Anny Naomy fez leitura. Qual atividade sobrou para Giovana?", opts: ["Escrita", "Leitura", "Cálculo", "Lógica"], ans: 2, exp: "Como Hellen fez lógica, Anny Naomy fez leitura e Ana Luiza não fez cálculo, a única atividade restante para Giovana é cálculo." },
               { q: "Durante uma atividade, Tio Rogério escreveu um código: A1, B2, C3, D4. Se a mesma lógica continuar, qual código representa a letra F?", opts: ["F5", "F6", "E6", "G6"], ans: 1, exp: "Cada letra corresponde à sua posição no alfabeto: A=1, B=2, C=3... Portanto, F corresponde ao número 6." },
                { q: "Se Ketlein lê 5 páginas de um livro por dia. Em uma semana (7 dias), quantas páginas ela terá lido no projeto de leitura?", opts: ["25", "30", "35", "40"], ans: 2, exp: "5 páginas x 7 dias = 35 páginas lidas e muito vocabulário novo adquirido!" },
                { q: "Qual alternativa não segue o mesmo padrão das demais?", opts: ["ABAB", "CDCD", "EFEF", "GHHI"], ans: 3, exp: "As três primeiras repetem um bloco de duas letras. 'GHHI' quebra esse padrão." },
                { q: "Tio Rogério escreveu no quadro: 'Leia todas as alternativas antes de responder.' Qual é a atitude mais lógica?", opts: ["Marcar a primeira resposta", "Responder sem ler", "Ler todas as alternativas antes de escolher", "Perguntar ao colega"], ans: 2, exp: "Seguir a instrução evita erros por falta de atenção e aumenta as chances de escolher a resposta correta." }
            ]},
        artes: { room: "Ateliê de Artes e Desenhos", npcs: ["Profª Gislene"], icon: "🎨",
            intro: "Bem-vindos ao ateliê de artes! Sou a Professora Gislene. Aqui transformamos papel, tintas e criatividade em lindos desenhos, pinturas e cenários para os nossos espetáculos. Preparados?",
            questions: [
                { q: "Um artista desenhou um quadrado, depois um pentágono, em seguida um hexágono. Mantendo o mesmo padrão, qual será a próxima figura?", opts: ["Triângulo", "Hexágono", "Heptágono", "Octógono"], ans: 2, exp: "O número de lados aumenta de um em um: 4, 5, 6... Portanto, a próxima figura tem 7 lados: um heptágono." },
                { q: "O cenário do espetáculo representa uma floresta viva. Misturando as tintas azul e amarela em nossa paleta, qual cor secundária obteremos para pintar as folhagens?", opts: ["Roxo", "Laranja", "Verde", "Marrom"], ans: 2, exp: "A mistura das cores primárias azul e amarelo gera a cor secundária verde, perfeita para os elementos da natureza!" },
                { q: "Um educando desenhou metade de uma borboleta no papel dobrado ao meio. Para completar o desenho corretamente, o outro lado deve ser:", opts: ["Maior que o primeiro lado", "Uma imagem espelhada do primeiro lado", "Um desenho diferente", "Com cores aleatórias"], ans: 1, exp: "A simetria acontece quando um lado é o reflexo do outro, como em uma imagem no espelho." },
                { q: "Estamos desenhando uma máscara teatral simétrica. O que significa garantir a simetria no desenho?", opts: ["Fazer um lado completamente diferente do outro", "Garantir que os dois lados divididos ao meio sejam correspondentes e equilibrados", "Pintar tudo com uma única cor", "Desenhar sem usar linhas"], ans: 1, exp: "A simetria em artes visuais cria um equilíbrio perfeito, onde o lado esquerdo espelha o lado direito harmoniosamente." },
                { q: "Para pintar um cenário que transmita energia, calor e alegria, a professora Gislene sugere usar cores quentes. Quais são as principais cores desse grupo?", opts: ["Azul, verde e roxo", "Preto, branco e cinza", "Vermelho, laranja e amarelo", "Rosa, lilás e prata"], ans: 2, exp: "Vermelho, laranja e amarelo são cores quentes, associadas ao fogo e ao sol, excelentes para transmitir vibração e energia em uma obra de arte." }
            ]},
        danca: { room: "Sala de Dança", npcs: ["Prof. Anderson", "Prof. Jessy", "Prof. Vitor", "Prof. Daniel"], icon: "🩰",
            intro: "Fala, artistas! Somos os Professores Anderson, Jessy, Vitor e Daniel. Na sala de dança usamos não só o corpo, mas muita matemática, contagem e ritmo espacial. Vamos aquecer a mente!",
            questions: [
                { q: "Em uma coreografia, Yasmin levanta o braço direito e Heloisa deve fazer o movimento como se fosse seu reflexo no espelho. Qual braço Heloisa deve levantar?", opts: ["Direito", "Esquerdo", "Os dois braços", "Nenhum braço"], ans: 1, exp: "Quando uma pessoa imita outra como um espelho, os lados ficam invertidos. O braço direito de um corresponde ao esquerdo do outro." },
                { q: "Para uma apresentação, Tio Jessy precisa escolher 3 bailarinas entre Vitória, Rayla, Cecilia e Emilly. Vitória só pode participar se Rayla também participar. Se Cecilia já foi escolhida, qual grupo pode subir ao palco?", opts: ["Vitória, Rayla e Emilly", "Vitória, Rayla e Cecilia", "Rayla, Cecilia e Emilly", "Vitória, Cecilia e Emilly"], ans: 1, exp: "Vitória só pode participar junto com Rayla. Como Cecilia já está no grupo, a única opção possível com Vitória é Vitória, Rayla e Cecilia." },
                { q: "Durante uma atividade na sala de dança da EDISCA, quatro bailarinas ocupam posições diferentes no espaço. Viviam está no centro da sala. Isabelly está à frente de Viviam. Flora está atrás de Viviam. Laissy está ao lado direito de Viviam. Quem está mais distante da frente da sala?", opts: ["Viviam", "Isabelly", "Flora", "Laissy"], ans: 2, exp: "Isabelly está à frente de Viviam e Flora está atrás dela. Portanto, Flora é quem está mais distante da frente da sala." },
                { q: "Na coreografia da EDISCA, cada sequência de movimentos segue um padrão: P = passo, G = giro e S = salto. Tio Anderson escreveu: P - G - S - G - P - G - S - G - P - G - __. Qual movimento completa a sequência?", opts: ["Passo", "Giro", "Salto", "Parada"], ans: 2, exp: "O bloco que se repete é P - G - S - G. Depois de P - G, o próximo movimento é S." },
                { q: "Se um *plié* exige que o joelho siga a linha da ponta do pé, o que acontece se o bailarino fechar o joelho para dentro?", opts: ["Fica mais bonito", "Ele ganha velocidade", "Risco de lesão no joelho e desalinhamento", "Nada acontece"], ans: 2, exp: "A anatomia humana exige alinhamento ósseo. Dançar com técnica é cuidar da própria saúde física." }
            ]},
        teatro: { room: "Teatro", npcs: ["Profª Mayra", "Profª Hariane", "Profª Adrielly", "Profª Gabrielle"], icon: "🎭",
            intro: "Bem-vindos ao Teatro! Somos a Professoras Mayra, Hariane, Adrielly e Gabrielle. Na EDISCA, o ápice do nosso trabalho são os grandes espetáculos de dança. Preparados para a lógica dos bastidores?",
            questions: [
                { q: "Na apresentação de ballet, Tia Adrielly combinou três regras: as bailarinas entram pelo lado esquerdo, a música começa antes da entrada e a iluminação muda durante a coreografia. Qual situação quebra uma dessas regras?", opts: ["A música começa antes da entrada", "A luz muda no meio da dança", "As bailarinas entram pelo lado direito", "A coreografia termina com a música"], ans: 2, exp: "A única regra quebrada é a entrada pelo lado direito, pois foi combinado que a entrada seria pelo lado esquerdo." },
                { q: "No teatro, as laterais do palco de onde os bailarinos entram escondidos do público chamam-se 'Coxias'. Se um bailarino entra pela coxia da Esquerda e tem que sair pelo lado oposto, por onde ele sai?", opts: ["Pelo teto", "Pela coxia Direita", "Pelo fundo do palco", "Pela plateia"], ans: 1, exp: "O lado oposto da Esquerda do palco é sempre a coxia da Direita." },
               { q: "Na coxia do teatro, a equipe recebeu três avisos: 'A bailarina azul entra antes da vermelha'. 'A bailarina verde entra depois da azul'. 'A bailarina vermelha entra depois da verde'. Qual é a ordem correta de entrada?", opts: ["Azul → Verde → Vermelha", "Vermelha → Azul → Verde", "Verde → Azul → Vermelha", "Azul → Vermelha → Verde"], ans: 0, exp: "A azul deve vir antes da verde, e a verde antes da vermelha. Portanto, a ordem correta é Azul → Verde → Vermelha." },
                { q: "Na marcação de palco, a numeração vai do centro (0) para as laterais (1, 2, 3...). Se a coreógrafa pede para todos se concentrarem no 'Ponto Zero', para onde o elenco vai?", opts: ["Para o canto direito", "Para o fundo do palco", "Para o centro exato do palco", "Para a coxia"], ans: 2, exp: "O 'Ponto 0' (ou centro) é a referência de alinhamento simétrico para a dança." },
                { q: "Durante o espetáculo 'Periferia' da EDISCA, a música parou acidentalmente. Como o elenco bem ensaiado deve reagir logicamente?", opts: ["Parar e olhar para a coxia", "Sair do palco chorando", "Continuar dançando no silêncio mantendo a contagem mental em grupo", "Sentar no chão"], ans: 2, exp: "O show não pode parar. O profissionalismo exige manter a contagem interna até o som voltar." }
            ]},
        biblioteca: { room: "Biblioteca", npcs: ["Profª Neile", "Profª Thafilla"], icon: "📚",
            intro: "Silêncio e respeito ao conhecimento! Somos as Professoras Neile e Thafilla. Aqui guardamos o precioso acervo literário e de pesquisa da instituição. Prontos para os desafios?",
            questions: [
                { q: "A biblioteca divide os livros por seção. Se temos: Artes, História e Ciências. Em qual prateleira guardamos um livro sobre a 'História do Ballet Moderno'?", opts: ["Apenas em História", "Na lixeira", "Na seção de Artes, subcategoria Dança", "Em Ciências"], ans: 2, exp: "Sendo um tema técnico de dança, ele pertence fundamentalmente ao acervo de Artes/Dança." },
                { q: "Um livro foi retirado por um aluno que tem prazo de 7 dias para devolver. Ele pegou o livro numa terça-feira. Qual o dia de devolução?", opts: ["Domingo", "Próxima terça-feira", "Sexta-feira", "Próxima quarta-feira"], ans: 1, exp: "Contando 7 dias exatos, o ciclo se fecha no mesmo dia da semana seguinte." },
                { q: "A ordem correta nas prateleiras segue as letras do alfabeto. Qual sequência está correta?", opts: ["Almeida, Costa, Silva, Barros", "Almeida, Barros, Costa, Silva", "Silva, Costa, Barros, Almeida", "Barros, Almeida, Silva, Costa"], ans: 1, exp: "A-B-C-S é a sequência alfabética correta para facilitar a localização das obras." },
                { q: "Por que não podemos comer lanches ou beber água perto dos livros do acervo da EDISCA?", opts: ["Para a biblioteca não ficar suja", "Livros não sentem fome", "Farelos atraem insetos que comem papel e líquidos podem manchar e destruir as páginas", "Para o bibliotecário não ver"], ans: 2, exp: "Preservação patrimonial. Livros são frágeis e os resíduos orgânicos os destroem rapidamente." },
                { q: "Você precisa pesquisar sobre a biografia de Pina Bausch para um trabalho do reforço. Qual a atitude mais eficiente?", opts: ["Ler todos os livros da biblioteca até achar", "Procurar a bibliotecária e pedir orientação para o catálogo de dança contemporânea", "Desistir da pesquisa", "Pegar um livro de matemática"], ans: 1, exp: "A bibliotecária tem o mapa lógico de todo o conhecimento armazenado no local. Sempre peça ajuda!" }
            ]},
        jardim: { room: "Manutenção e Zelo", npcs: ["Profª Fátima", "Prof. João", "Prof. Igor", "Prof. Clemilson"], icon: "🌱",
            intro: "Bom dia! Nós somos a Fátima, o João, o Igor e o Clemilson. Mantemos a EDISCA limpa, segura e impecável para todos vocês. Cuidar do espaço é responsabilidade coletiva. Vamos organizar?",
            questions: [
                { q: "Para lavar o pátio externo, a equipe utiliza baldes no lugar da mangueira aberta. Qual é a lógica sustentável dessa atitude?", opts: ["Para demorar mais o serviço", "Evitar o desperdício de água, preservando um recurso natural e economizando dinheiro da ONG", "Porque a mangueira quebrou", "Apenas por costume"], ans: 1, exp: "A mangueira aberta gasta centenas de litros. O uso consciente de água é um pilar da responsabilidade social." },
                { q: "A coleta seletiva na escola tem as cores: Azul (Papel), Vermelho (Plástico) e Orgânico (Marrom). Onde você joga o copinho de água vazio e a casca de banana, respectivamente?", opts: ["Vermelho e Azul", "Azul e Marrom", "Vermelho e Marrom", "Tudo no Azul"], ans: 2, exp: "Plástico (copinho) vai no vermelho. Restos de comida (casca) vão no marrom (orgânico)." },
                { q: "Varremos a escola de cima para baixo (do último andar para o térreo). Por que usar essa lógica na faxina?", opts: ["Porque é mais fácil descer escadas", "Para a sujeira dos andares de cima não cair nas áreas inferiores já limpas", "Para não cansar as pernas", "Por estética"], ans: 1, exp: "A gravidade faz com que a poeira sempre desça. Começar de cima garante que o trabalho não tenha que ser refeito." },
                { q: "O que acontece logicamente se os educandos deixam papeis picados no chão da sala de dança antes de saírem?", opts: ["O papel some magicamente", "A equipe de limpeza é sobrecarregada, atrasando a liberação da sala para a próxima turma", "Nada, é a função deles", "O chão fica mais bonito"], ans: 1, exp: "Manter a limpeza é dever de todos. Se cada turma sujar sem recolher, o cronograma da escola inteira atrasa." },
                { q: "Um produto de limpeza precisa ser diluído: 1 tampa de produto para 10 litros de água. Se vamos preparar 20 litros, quantas tampas usamos?", opts: ["1 tampa", "2 tampas", "3 tampas", "5 tampas"], ans: 1, exp: "Mantendo a proporção, se dobramos a quantidade de água, dobramos o produto: 2 tampas." }
            ]},
        saude: { room: "Saúde", npcs: ["Profª Lorena", "Profª Livia"], icon: "❤️",
            intro: "Saúde física e mental em primeiro lugar! Somos as Professoras Lorena e Livia. Cuidamos das lesões e do bem-estar psicológico de nossos talentos. Resolvam esses casos clínicos!",
            questions: [
                { q: "Um bailarino torceu o tornozelo na aula. Para estancar o inchaço nos primeiros 15 minutos, a fisioterapia aplica:", opts: ["Bolsa de água quente", "Gelo (crioterapia)", "Massagear com força", "Mandar ele voltar a dançar"], ans: 1, exp: "O gelo contrai os vasos sanguíneos, diminuindo imediatamente a inflamação e a dor no momento do trauma." },
                { q: "Na sala da saúde, a equipe acompanha quatro educandas. Sabe-se que: Kamilla está com dor no pé; Nikaelly precisa descansar; Isadora está aguardando uma avaliação; e Valentina já foi liberada. Quem deve ser atendida primeiro pela equipe?", opts: ["Valentina", "Isadora", "Kamilla", "Nikaelly"], ans: 2, exp: "Entre as situações apresentadas, Kamilla possui uma queixa física que precisa ser avaliada antes de uma liberação ou orientação." },
                { q: "O ensaio do espetáculo é intenso e dura 4 horas. A sala é quente. O que deve ser feito logisticamente para evitar desidratação e cãibras?", opts: ["Beber apenas no final das 4h", "Paradas curtas e programadas para ingestão de água", "Beber 3 litros de uma vez", "Comer salgado"], ans: 1, exp: "A hidratação constante mantém os músculos oxigenados e previne lesões durante o esforço extremo." },
                { q: "Qual postura corporal é ensinada na fisioterapia para proteger a coluna de uma costureira ou funcionário que trabalha muito tempo sentado?", opts: ["Sentar na ponta da cadeira com os ombros curvados", "Apoiar a lombar no encosto e manter os pés no chão", "Cruzar as pernas o dia todo", "Sentar no chão"], ans: 1, exp: "A ergonomia (pés apoiados e coluna reta) distribui o peso do corpo e evita compressões na coluna vertebral." },
                { q: "Se a psicologia foca na mente e a fisioterapia no corpo, o que significa a expressão 'cuidado integral' praticada na EDISCA?", opts: ["Cuidar de um de cada vez em anos diferentes", "Entender que o sofrimento mental pode gerar dor física, e tratar o educando como um todo", "Apenas focar na dança", "Apenas medicar"], ans: 1, exp: "Corpo e mente estão interligados. A ansiedade pode tencionar o corpo e causar lesões físicas, por isso o cuidado é integrado." }
            ]},
        ti: { room: "Sala de TI", npcs: ["Prof. Vinicius"], icon: "💻",
            intro: "Olá! Sou o Professor Vinicius, responsável pelo setor de TI da EDISCA. Eu cuido da rede de internet, segurança cibernética e de todos os computadores que ajudam a nossa instituição a voar alto. Vamos arrumar a rede?",
            questions: [
                { q: "Um computador da secretaria perdeu a conexão com a internet, enquanto o restante da escola navega normalmente. Qual o primeiro passo de suporte lógico?", opts: ["Reinstalar o sistema operacional", "Verificar se o cabo de rede está firmemente conectado atrás do computador", "Ligar para a provedora reclamando de queda total", "Comprar uma máquina nova"], ans: 1, exp: "A verificação das conexões físicas de cabo e Wi-Fi locais deve anteceder qualquer formatação ou análise complexa." },
                { q: "Para garantir a integridade dos dados dos alunos contra ataques e vírus invasores na rede da EDISCA, qual ferramenta deve ser mantida ativa?", opts: ["Calculadora", "Navegador em modo privado", "Antivírus e Firewall atualizados", "Software de edição de imagem"], ans: 2, exp: "O Antivírus combinado ao Firewall ativo previne, detecta e bloqueia ameaças digitais que tentam infectar os computadores." },
                { q: "O setor financeiro precisa garantir que as planilhas e relatórios vitais da EDISCA não sejam perdidos em caso de falha do computador. O que recomenda?", opts: ["Salvar tudo na lixeira para ocultar", "Configurar backups automáticos diários em nuvem protegida", "Anotar tudo em guardanapos", "Deixar o computador ligado para sempre"], ans: 1, exp: "Backups frequentes e automáticos na nuvem garantem que os dados históricos da ONG estejam seguros de acidentes técnicos." },
                { q: "A secretaria recebe um e-mail com o título 'Urgente: Altere sua senha clicando neste link' enviado por um endereço desconhecido. O que fazer?", opts: ["Clicar correndo e digitar a senha de administrador", "Não clicar, alertar o Prof. Vinicius de TI e marcar como spam/phishing", "Encaminhar para o grupo de pais", "Excluir o computador"], ans: 1, exp: "Ataques de Phishing tentam enganar usuários com urgências falsas. Desconfie, não clique e acione o suporte de TI." },
                { q: "Se temos um plano de banda de internet de 600 Megas e precisamos distribuí-la igualmente entre 6 salas com computadores de aula. Quanto cada sala recebe?", opts: ["50 Megas", "100 Megas", "150 Megas", "600 Megas"], ans: 1, exp: "Dividindo 600 Megas de banda por 6 setores, obtemos 100 Megas por setor para garantir conectividade estável para todos." }
            ]},
        brecho: { room: "Brechó Segundo Ato", npcs: ["Profª Marina, Prof. Pedro"], icon: "🛍️",

    function iih(h) { return Math.max(20, h - 20); }

    // ---- Elementos naturais espalhados pelo gramado (árvores, arbustos, fauna) ----
    let TREES = [], BUSHES = [], FLOWER_PATCHES = [], BUTTERFLIES = [], BIRDS = [], LEAVES = [];

    function generateAmbientDecor() {
        TREES = []; BUSHES = []; FLOWER_PATCHES = [];
        for (let r = 3; r < ROWS - 3; r++) {
            for (let c = 3; c < COLS - 3; c++) {
                if (map[r][c] !== 0) continue;
                let rt = seededRand(r, c, 10);
                if (rt < 0.018 && tileClear(r, c, 1)) {
                    TREES.push({ x: c * TILE + TILE / 2, y: r * TILE + TILE / 2, scale: 0.8 + seededRand(r, c, 11) * 0.6, sway: r * 13 + c * 7, big: seededRand(r, c, 12) > 0.5 });
                    continue;
                }
                let rb = seededRand(r, c, 20);
                if (rb < 0.012 && tileClear(r, c, 0)) {
                    BUSHES.push({ x: c * TILE + TILE / 2, y: r * TILE + TILE / 2, sway: r * 9 + c * 5 });
                    continue;
                }
                let rf = seededRand(r, c, 30);
                if (rf < 0.02 && tileClear(r, c, 0)) {
                    FLOWER_PATCHES.push({ x: c * TILE + TILE / 2, y: r * TILE + TILE / 2, hue: Math.floor(seededRand(r, c, 31) * 5) });
                }
            }
        }
        BUTTERFLIES = []; for (let i = 0; i < 7; i++) BUTTERFLIES.push({ x: MAP_W * Math.random(), y: MAP_H * Math.random(), a: Math.random() * Math.PI * 2, speed: 20 + Math.random() * 18, hue: Math.floor(Math.random() * 3), wobble: Math.random() * 10 });
        BIRDS = []; for (let i = 0; i < 4; i++) BIRDS.push({ x: MAP_W * Math.random(), y: 200 + Math.random() * (MAP_H - 400), dir: Math.random() > 0.5 ? 1 : -1, speed: 60 + Math.random() * 40, offset: Math.random() * 1000 });
        LEAVES = []; for (let i = 0; i < 18; i++) LEAVES.push({ x: MAP_W * Math.random(), y: MAP_H * Math.random(), speed: 8 + Math.random() * 10, drift: Math.random() * Math.PI * 2, hue: Math.floor(Math.random() * 3) });
    }

    let lastAmbientT = 0;
    function updateAmbient(now) {
        let dt = lastAmbientT ? Math.min(0.05, (now - lastAmbientT) / 1000) : 0.016;
        lastAmbientT = now;
        for (let b of BUTTERFLIES) {
            b.a += (seededRand(Math.floor(b.x), Math.floor(b.y), 1) - 0.5) * 0.6 * dt * 10;
            b.x += Math.cos(b.a) * b.speed * dt; b.y += Math.sin(b.a) * b.speed * dt + Math.sin(now / 300 + b.wobble) * 0.4;
            if (b.x < TILE * 2) b.a = 0; if (b.x > MAP_W - TILE * 2) b.a = Math.PI;
            if (b.y < TILE * 2) b.a = Math.PI / 2; if (b.y > MAP_H - TILE * 2) b.a = -Math.PI / 2;
        }
        for (let bird of BIRDS) {
            bird.x += bird.dir * bird.speed * dt;
            if (bird.x > MAP_W + 60) bird.x = -60;
            if (bird.x < -60) bird.x = MAP_W + 60;
        }
        for (let lf of LEAVES) {
            lf.y += lf.speed * dt; lf.x += Math.sin(now / 500 + lf.drift) * 12 * dt;
            if (lf.y > MAP_H) lf.y = 0;
        }
    }

    function drawTree(t, now) {
        let sway = Math.sin(now / 1400 + t.sway) * 3 * t.scale;
        let s = t.scale, big = t.big;
        ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.beginPath(); ctx.ellipse(t.x, t.y + 4, 16 * s, 6 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#5b3a21"; ctx.lineWidth = 6 * s; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.x + sway * 0.3, t.y - 22 * s); ctx.stroke();
        ctx.save(); ctx.translate(t.x + sway * 0.3, t.y - 30 * s); ctx.rotate(sway * 0.01);
        const green1 = big ? "#2f6b2f" : "#3a7d3a", green2 = big ? "#3f8f3f" : "#4fa84f", green3 = big ? "#5cb35c" : "#68c268";
        ctx.fillStyle = green1; ctx.beginPath(); ctx.arc(0, 4, 20 * s, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = green2; ctx.beginPath(); ctx.arc(-10 * s, -6 * s, 15 * s, 0, Math.PI * 2); ctx.arc(11 * s, -4 * s, 15 * s, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = green3; ctx.beginPath(); ctx.arc(-2 * s, -14 * s, 13 * s, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
    function drawBush(b, now) {
        let sway = Math.sin(now / 900 + b.sway) * 1.5;
        ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.ellipse(b.x, b.y + 6, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#3f8f3f";
        ctx.beginPath(); ctx.arc(b.x - 6 + sway, b.y, 7, 0, Math.PI * 2); ctx.arc(b.x + 6 + sway, b.y, 7, 0, Math.PI * 2); ctx.arc(b.x + sway, b.y - 5, 8, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#5cb35c";
        ctx.beginPath(); ctx.arc(b.x - 2 + sway, b.y - 6, 4, 0, Math.PI * 2); ctx.fill();
    }
    function drawFlowerPatch(f, now) {
        const palettes = [["#f43f5e", "#fecdd3"], ["#f59e0b", "#fde68a"], ["#8b5cf6", "#ddd6fe"], ["#ec4899", "#fbcfe8"], ["#3b82f6", "#bfdbfe"]];
        const [dark, light] = palettes[f.hue];
        for (let i = 0; i < 4; i++) {
            let ang = i * 1.7 + f.hue;
            let px = f.x + Math.cos(ang) * 6, py = f.y + Math.sin(ang) * 5 + Math.sin(now / 700 + f.x) * 1;
            ctx.fillStyle = i % 2 === 0 ? dark : light;
            ctx.beginPath(); ctx.arc(px, py, 2.4, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = "#facc15"; ctx.beginPath(); ctx.arc(f.x, f.y, 1.4, 0, Math.PI * 2); ctx.fill();
    }
    function drawButterfly(b, now) {
        let flap = Math.sin(now / 90 + b.x) * 0.5 + 0.5;
        const colors = [["#f59e0b", "#fde68a"], ["#ec4899", "#fbcfe8"], ["#38bdf8", "#bae6fd"]];
        const [c1, c2] = colors[b.hue];
        ctx.save(); ctx.translate(b.x, b.y);
        ctx.fillStyle = c1;
        ctx.beginPath(); ctx.ellipse(-3, 0, 3.2 * (0.4 + flap * 0.6), 4, 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = c2;
        ctx.beginPath(); ctx.ellipse(3, 0, 3.2 * (0.4 + flap * 0.6), 4, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#292524"; ctx.fillRect(-0.5, -3, 1, 6);
        ctx.restore();
    }
    function drawBird(b, now) {
        let flap = Math.sin(now / 120 + b.offset) * 4;
        ctx.strokeStyle = "#292524"; ctx.lineWidth = 1.6; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(b.x - 6, b.y - flap); ctx.quadraticCurveTo(b.x, b.y + 3, b.x + 6, b.y - flap);
        ctx.stroke();
    }
    function drawLeaf(lf, now) {
        const colors = ["#eab308", "#f97316", "#a16207"];
        ctx.fillStyle = colors[lf.hue];
        ctx.save(); ctx.translate(lf.x, lf.y); ctx.rotate(now / 600 + lf.drift);
        ctx.beginPath(); ctx.ellipse(0, 0, 3, 1.6, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    const keys = { up: false, down: false, left: false, right: false, action: false };

    // ==========================================================================
    // SISTEMA DE INPUT (COMPATIBILIDADE MULTI-TOQUE MOBILE SEM TRAVAMENTOS)
    // ==========================================================================
    function setupInput() {
        const setKey = (k, state) => {
            if (k === "ArrowUp" || k === "w") keys.up = state;
            if (k === "ArrowDown" || k === "s") keys.down = state;
            if (k === "ArrowLeft" || k === "a") keys.left = state;
            if (k === "ArrowRight" || k === "d") keys.right = state;
            if (k === " " || k === "Enter") { keys.action = state; if(state) checkInteraction(); }
        };
        window.addEventListener("keydown", e => setKey(e.key, true));
        window.addEventListener("keyup", e => setKey(e.key, false));

        const touchMappings = [
            { id: "btn-up", key: "up" },
            { id: "btn-down", key: "down" },
            { id: "btn-left", key: "left" },
            { id: "btn-right", key: "right" }
        ];

        touchMappings.forEach(mapping => {
            const btn = document.getElementById(mapping.id);
            if (btn) {
                btn.addEventListener("touchstart", (e) => {
                    e.preventDefault();
                    keys[mapping.key] = true;
                }, { passive: false });

                btn.addEventListener("touchend", (e) => {
                    e.preventDefault();
                    keys[mapping.key] = false;
                }, { passive: false });

                btn.addEventListener("touchcancel", (e) => {
                    e.preventDefault();
                    keys[mapping.key] = false;
                }, { passive: false });

                btn.addEventListener("mousedown", (e) => {
                    keys[mapping.key] = true;
                });
                btn.addEventListener("mouseup", (e) => {
                    keys[mapping.key] = false;
                });
                btn.addEventListener("mouseleave", (e) => {
                    keys[mapping.key] = false;
                });
            }
        });

        const actionBtn = document.getElementById("btn-action");
        if (actionBtn) {
            actionBtn.addEventListener("touchstart", (e) => {
                e.preventDefault();
                checkInteraction();
            }, { passive: false });

            actionBtn.addEventListener("mousedown", (e) => {
                checkInteraction();
            });
        }
    }

    function checkCollision(nx, ny) {
        const pad = 2; 
        const c1 = Math.floor((nx+pad) / TILE), c2 = Math.floor((nx + player.width - pad) / TILE);
        const r1 = Math.floor((ny+pad) / TILE), r2 = Math.floor((ny + player.height - pad) / TILE);
        for (let r = r1; r <= r2; r++) {
            for (let c = c1; c <= c2; c++) {
                if (!map[r] || map[r][c] === 1 || map[r][c] === 4) return true;
            }
        }
        return false;
    }

    function updatePhysics() {
        if (document.getElementById("dialog-overlay").style.display === "flex") return;

        let dx = 0, dy = 0;
        if (keys.up) dy = -player.speed;
        if (keys.down) dy = player.speed;
        if (keys.left) dx = -player.speed;
        if (keys.right) dx = player.speed;

        if (dx !== 0 && !checkCollision(player.x + dx, player.y)) player.x += dx;
        if (dy !== 0 && !checkCollision(player.x, player.y + dy)) player.y += dy;

        camX = Math.max(0, Math.min(player.x - canvas.width / 2, MAP_W - canvas.width));
        camY = Math.max(0, Math.min(player.y - canvas.height / 2, MAP_H - canvas.height));

        checkProximity();
    }

    let activeNPC = null;
    function checkProximity() {
        activeNPC = null;
        for (let key in npcLocations) {
            let loc = npcLocations[key];
            let dist = Math.hypot(player.x - loc.x, player.y - loc.y);
            if (dist < 80) { activeNPC = key; break; } 
        }
        const prompt = document.getElementById("interaction-prompt");
        if (activeNPC && !questState[activeNPC].completed) {
            prompt.style.display = "block";
            prompt.innerHTML = `Falar com: <b>${questsData[activeNPC].npcs.join(", ")}</b>`;
        } else { prompt.style.display = "none"; }
    }

    // ==========================================================================
    // 4. SISTEMA DE DESAFIOS (Lógica de Modais)
    // ==========================================================================
    function checkInteraction() {
        if (activeNPC && document.getElementById("dialog-overlay").style.display !== "flex") openDialog(activeNPC);
    }

    function openDialog(npcKey) {
        const data = questsData[npcKey];
        const state = questState[npcKey];
        document.getElementById("dialog-overlay").style.display = "flex";
        document.getElementById("dialog-npc").innerText = data.npcs.join(" & ");
        document.getElementById("dialog-room").innerText = data.room;
        document.getElementById("dialog-icon").innerText = data.icon;

        if (state.completed) {
            document.getElementById("dialog-content").innerHTML = `Excelente trabalho! Nosso espaço está mais organizado e preparado graças a você.`;
            document.getElementById("dialog-actions").innerHTML = `<button class="game-btn" onclick="closeDialog()">Valeu!</button>`;
        } else {
            document.getElementById("dialog-content").innerHTML = data.intro;
            document.getElementById("dialog-actions").innerHTML = `<button class="game-btn" onclick="startChallenge('${npcKey}')">Começar</button> <button class="game-btn" style="background:var(--dark);" onclick="closeDialog()">Depois</button>`;
        }
    }

    function startChallenge(npcKey) {
        const data = questsData[npcKey];
        const qIndex = questState[npcKey].currentQ;
        const q = data.questions[qIndex];
        
        let html = `<div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">Desafio Operacional ${qIndex + 1}/5:</div><div style="margin-bottom:20px;">${q.q}</div>`;
        q.opts.forEach((opt, idx) => {
            html += `<button class="option-btn" onclick="answer('${npcKey}', ${idx}, ${q.ans}, '${q.exp.replace(/'/g, "\\'")}')">${opt}</button>`;
        });
        document.getElementById("dialog-content").innerHTML = html;
        document.getElementById("dialog-actions").innerHTML = "";
    }

    function answer(npcKey, selected, correct, exp) {
        const state = questState[npcKey];
        let c = document.getElementById("dialog-content"), a = document.getElementById("dialog-actions");
        if (selected === correct) {
            player.score += 20; document.getElementById("hud-score").innerText = `⭐ ${player.score}`;
            c.innerHTML = `<h3 style="color:#4ecdc4;">✨ Brilhante! É assim que se faz.</h3><p style="margin-top:10px;">${exp}</p>`;
            state.currentQ++;
            if (state.currentQ >= 5) {
                state.completed = true;
                a.innerHTML = `<button class="game-btn" style="background:#ffe66d; color:#292f36;" onclick="earnMedal('${npcKey}')">Receber Selo</button>`;
            } else { a.innerHTML = `<button class="game-btn" onclick="startChallenge('${npcKey}')">Próxima Situação</button>`; }
        } else {
            c.innerHTML = `<h3 style="color:#ff6b6b;">❌ Atenção!</h3><p>Esse não é o procedimento correto para a nossa rotina. Pense em como as coisas funcionam aqui e tente novamente!</p>`;
            a.innerHTML = `<button class="game-btn" onclick="startChallenge('${npcKey}')">Tentar Novamente</button>`;
        }
    }

    function earnMedal(npcKey) {
        document.getElementById("m-" + npcKey).classList.add("active");
        closeDialog();
        if (Object.values(questState).every(s => s.completed)) {
            setTimeout(() => {
                document.getElementById("dialog-overlay").style.display = "flex";
                document.getElementById("dialog-npc").innerText = "🏆 Coração EDISCA 🏆";
                document.getElementById("dialog-content").innerHTML = `<h2 style="color:#ffe66d;text-align:center;">PARABÉNS, ${player.name}!</h2><p style="text-align:center;">Você ajudou em todos os setores da instituição. Agora você entende perfeitamente que o espetáculo no palco só acontece por causa do trabalho de cada equipe nos bastidores. O talento brilha onde a educação e a união são a base!</p>`;
                document.getElementById("dialog-actions").innerHTML = `<button class="game-btn" onclick="location.reload()">Recomeçar</button>`;
            }, 1000);
        }
    }
    function closeDialog() { document.getElementById("dialog-overlay").style.display = "none"; }

    // ==========================================================================
    // 5. RENDERIZAÇÃO
    // ==========================================================================
    function drawSign(x, y, text, icon) {
        let label = (icon ? icon + "  " : "") + text;
        ctx.font = "bold 12px 'Baloo 2', 'Courier New', sans-serif";
        let textW = ctx.measureText(label).width;
        let boxW = Math.max(textW + 18, 60);
        let offset = (boxW - 60) / 2; // Centraliza a placa no NPC
        let sx = x - offset;

        ctx.fillStyle = "rgba(0,0,0,0.22)"; ctx.fillRect(sx + 3, y + 3, boxW, 20);
        ctx.fillStyle = "#5b3a21"; ctx.fillRect(x + 26, y + 20, 8, 16);
        ctx.fillStyle = "#78350f"; ctx.fillRect(x + 27, y + 20, 2, 16);
        ctx.fillStyle = "#92400e"; ctx.fillRect(sx, y, boxW, 20);
        ctx.strokeStyle = "#451a03"; ctx.lineWidth = 2; ctx.strokeRect(sx, y, boxW, 20);
        ctx.fillStyle = "#d97706"; ctx.fillRect(sx + 2, y + 2, boxW - 4, 16);
        ctx.fillStyle = "rgba(255,255,255,0.18)"; ctx.fillRect(sx + 2, y + 2, boxW - 4, 4);
        ctx.fillStyle = "#451a03";
        ctx.beginPath(); ctx.arc(sx + 6, y + 5, 1.4, 0, Math.PI * 2); ctx.arc(sx + boxW - 6, y + 5, 1.4, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = "#fffbeb"; ctx.textAlign = "center";
        ctx.fillText(label, x + 30, y + 14);
        ctx.textAlign = "left";
    }

    function drawCharacter(x, y, skin, shirt, pants, hair, hStyle, glasses, isHero) {
        ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(x+12, y+36, 12, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = "#111";

        if(isHero) {
            ctx.fillStyle = "#18181b"; ctx.fillRect(x+6, y+14, 12, 14); ctx.strokeRect(x+6, y+14, 12, 14);
            ctx.fillStyle = skin; ctx.fillRect(x+6, y+28, 4, 10); ctx.strokeRect(x+6, y+28, 4, 10);
            ctx.fillRect(x+14, y+28, 4, 10); ctx.strokeRect(x+14, y+28, 4, 10);
            ctx.fillStyle = "#fef08a"; ctx.fillRect(x+5, y+35, 6, 4); ctx.fillRect(x+13, y+35, 6, 4);
            ctx.fillStyle = skin; ctx.fillRect(x+2, y+15, 4, 12); ctx.strokeRect(x+2, y+15, 4, 12);
            ctx.fillRect(x+18, y+15, 4, 12); ctx.strokeRect(x+18, y+15, 4, 12);
            ctx.fillStyle = "rgba(255,255,255,0.12)"; ctx.fillRect(x+6, y+14, 4, 14);
        } else {
            ctx.fillStyle = pants; ctx.fillRect(x+6, y+26, 4, 10); ctx.strokeRect(x+6, y+26, 4, 10);
            ctx.fillRect(x+14, y+26, 4, 10); ctx.strokeRect(x+14, y+26, 4, 10);
            ctx.fillStyle = "#000"; ctx.fillRect(x+5, y+34, 6, 4); ctx.fillRect(x+13, y+34, 6, 4);
            ctx.fillStyle = shirt; ctx.fillRect(x+5, y+14, 14, 13); ctx.strokeRect(x+5, y+14, 14, 13);
            ctx.fillStyle = shirt; ctx.fillRect(x+1, y+14, 4, 6); ctx.fillRect(x+19, y+14, 4, 6);
            ctx.fillStyle = skin; ctx.fillRect(x+1, y+20, 4, 6); ctx.strokeRect(x+1, y+20, 4, 6);
            ctx.fillRect(x+19, y+20, 4, 6); ctx.strokeRect(x+19, y+20, 4, 6);
            ctx.fillStyle = "rgba(255,255,255,0.14)"; ctx.fillRect(x+5, y+14, 14, 3);
        }

        ctx.fillStyle = skin; ctx.fillRect(x+6, y+2, 12, 12); ctx.strokeRect(x+6, y+2, 12, 12);
        ctx.fillStyle = "rgba(255,255,255,0.16)"; ctx.fillRect(x+7, y+3, 4, 3);

        let blinking = ((Date.now() + x*37 + y*19) % 3200) < 120;
        ctx.fillStyle = "#000";
        if (blinking) { ctx.fillRect(x+8, y+8, 2, 1); ctx.fillRect(x+14, y+8, 2, 1); }
        else { ctx.fillRect(x+8, y+7, 2, 3); ctx.fillRect(x+14, y+7, 2, 3); }

        if(glasses) {
            ctx.strokeStyle = "#4b5563"; ctx.lineWidth = 1;
            ctx.strokeRect(x+7, y+6, 4, 4); ctx.strokeRect(x+13, y+6, 4, 4);
            ctx.beginPath(); ctx.moveTo(x+11, y+8); ctx.lineTo(x+13, y+8); ctx.stroke();
        }

        ctx.fillStyle = hair;
        if(hStyle === 1) { 
            ctx.fillRect(x+5, y, 14, 4); 
            ctx.fillRect(x+5, y+4, 2, 4); ctx.fillRect(x+17, y+4, 2, 4);
        } else if (hStyle === 2) { 
            ctx.fillRect(x+4, y-2, 16, 6);
            ctx.fillRect(x+4, y+4, 3, 10); ctx.fillRect(x+17, y+4, 3, 10);
        } else if (hStyle === 3) { 
            ctx.fillRect(x+5, y, 14, 4);
            ctx.beginPath(); ctx.arc(x+12, y, 4, 0, Math.PI*2); ctx.fill(); 
        }
    }

    function draw() {
        const now = Date.now();
        let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        skyGrad.addColorStop(0, "#bfead9"); skyGrad.addColorStop(1, "#eef7ea");
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(Math.floor(-camX), Math.floor(-camY));

        const c1 = Math.max(0, Math.floor(camX / TILE)), c2 = Math.min(COLS - 1, Math.floor((camX + canvas.width) / TILE));
        const r1 = Math.max(0, Math.floor(camY / TILE)), r2 = Math.min(ROWS - 1, Math.floor((camY + canvas.height) / TILE));

        for (let r = r1; r <= r2; r++) {
            for (let c = c1; c <= c2; c++) {
                let tx = c * TILE, ty = r * TILE, type = map[r][c];
                let above = (r > 0) ? map[r - 1][c] : -1;
                let below = (r < ROWS - 1) ? map[r + 1][c] : -1;
                let left = (c > 0) ? map[r][c - 1] : -1;
                let right = (c < COLS - 1) ? map[r][c + 1] : -1;

                if (type === 0) {
                    // GRAMA viva: tonalidades variadas, sombra suave, fios ao vento, pedrinhas e folhas soltas
                    let v = seededRand(r, c, 1);
                    ctx.fillStyle = v < 0.55 ? "#5f9c2e" : (v < 0.8 ? "#6bab34" : "#568c29");
                    ctx.fillRect(tx, ty, TILE, TILE);
                    if (seededRand(r, c, 2) < 0.18) {
                        ctx.fillStyle = "rgba(0,0,0,0.06)";
                        ctx.beginPath(); ctx.ellipse(tx + TILE * 0.5, ty + TILE * 0.6, TILE * 0.4, TILE * 0.16, 0, 0, Math.PI * 2); ctx.fill();
                    }
                    let sw = Math.sin(now / 700 + r * 0.6 + c * 0.4) * 2;
                    ctx.strokeStyle = "rgba(70,110,30,0.55)"; ctx.lineWidth = 1.3;
                    for (let g = 0; g < 3; g++) {
                        let gx = tx + 7 + g * 12 + seededRand(r, c, g + 3) * 6, gy = ty + TILE - 4;
                        ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx + sw, gy - 9); ctx.stroke();
                    }
                    if (seededRand(r, c, 7) < 0.05) {
                        ctx.fillStyle = "#9ca39a"; ctx.beginPath(); ctx.ellipse(tx + TILE * 0.7, ty + TILE * 0.35, 3.2, 2, 0.3, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.ellipse(tx + TILE * 0.7 - 1, ty + TILE * 0.35 - 1, 1.1, 0.7, 0.3, 0, Math.PI * 2); ctx.fill();
                    }
                    if (seededRand(r, c, 8) < 0.045) {
                        ctx.fillStyle = "#b45309"; ctx.save(); ctx.translate(tx + TILE * 0.28, ty + TILE * 0.75); ctx.rotate(seededRand(r, c, 9) * Math.PI);
                        ctx.beginPath(); ctx.ellipse(0, 0, 2.6, 1.3, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                    }
                }
                else if (type === 1) {
                    // FACHADA DA ESCOLA: telhado (topo), base (frente/porta) e paredes laterais com janelas
                    let isRoof = (below === 3) && (above !== 1);
                    let isFront = (above === 3) && (below !== 1);
                    if (isRoof) {
                        ctx.fillStyle = "rgba(0,0,0,0.22)"; ctx.fillRect(tx - 2, ty - 6, TILE + 4, 8);
                        let roofGrad = ctx.createLinearGradient(tx, ty - 10, tx, ty + TILE * 0.6);
                        roofGrad.addColorStop(0, "#c2540f"); roofGrad.addColorStop(1, "#7c2d12");
                        ctx.fillStyle = roofGrad; ctx.fillRect(tx, ty - 10, TILE, TILE * 0.6);
                        ctx.strokeStyle = "rgba(0,0,0,0.22)"; ctx.lineWidth = 1;
                        for (let i = 1; i < 4; i++) { ctx.beginPath(); ctx.moveTo(tx, ty - 10 + i * 6); ctx.lineTo(tx + TILE, ty - 10 + i * 6); ctx.stroke(); }
                        ctx.fillStyle = "#57534e"; ctx.fillRect(tx, ty + TILE * 0.5, TILE, TILE * 0.5);
                    } else if (isFront) {
                        ctx.fillStyle = "#eee7d8"; ctx.fillRect(tx, ty, TILE, TILE);
                        ctx.fillStyle = "rgba(0,0,0,0.12)"; ctx.fillRect(tx, ty + TILE - 6, TILE, 6);
                        ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.strokeRect(tx, ty, TILE, TILE);
                    } else {
                        ctx.fillStyle = "#ded7c7"; ctx.fillRect(tx, ty, TILE, TILE);
                        ctx.strokeStyle = "rgba(0,0,0,0.07)"; ctx.lineWidth = 1;
                        for (let i = 1; i < 3; i++) { ctx.beginPath(); ctx.moveTo(tx, ty + i * (TILE / 3)); ctx.lineTo(tx + TILE, ty + i * (TILE / 3)); ctx.stroke(); }
                        if (above === 1 && below === 1 && seededRand(r, c, 40) < 0.5) {
                            ctx.fillStyle = "#38bdf8"; ctx.fillRect(tx + 10, ty + 12, TILE - 20, 16);
                            ctx.strokeStyle = "#78350f"; ctx.lineWidth = 2; ctx.strokeRect(tx + 10, ty + 12, TILE - 20, 16);
                            ctx.beginPath(); ctx.moveTo(tx + TILE / 2, ty + 12); ctx.lineTo(tx + TILE / 2, ty + 28); ctx.stroke();
                            ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.fillRect(tx + 12, ty + 14, 6, 4);
                        }
                    }
                }
                else if (type === 2) {
                    // CAMINHO: textura orgânica, pedrinhas, marcas de uso e borda com o gramado
                    let v = seededRand(r, c, 50);
                    ctx.fillStyle = v < 0.5 ? "#c98a4b" : (v < 0.8 ? "#bf7d3e" : "#ad7038");
                    ctx.fillRect(tx, ty, TILE, TILE);
                    if (seededRand(r, c, 51) < 0.35) {
                        ctx.fillStyle = "rgba(0,0,0,0.08)";
                        ctx.beginPath(); ctx.ellipse(tx + TILE * seededRand(r, c, 52), ty + TILE * seededRand(r, c, 53), 6, 3, 0, 0, Math.PI * 2); ctx.fill();
                    }
                    if (seededRand(r, c, 54) < 0.22) { ctx.fillStyle = "#8a5a2b"; ctx.beginPath(); ctx.ellipse(tx + TILE * 0.3, ty + TILE * 0.6, 3, 2, 0.4, 0, Math.PI * 2); ctx.fill(); }
                    ctx.fillStyle = "rgba(101,163,13,0.35)";
                    if (above === 0) ctx.fillRect(tx, ty, TILE, 4);
                    if (below === 0) ctx.fillRect(tx, ty + TILE - 4, TILE, 4);
                    if (left === 0) ctx.fillRect(tx, ty, 4, TILE);
                    if (right === 0) ctx.fillRect(tx + TILE - 4, ty, 4, TILE);
                }
                else if (type === 3) {
                    // PISO INTERNO: xadrez suave, e porta bonita nas aberturas para fora
                    let isDoorway = (below === 0 || below === 2);
                    if (isDoorway) {
                        ctx.fillStyle = "#78350f"; ctx.fillRect(tx, ty, TILE, TILE);
                        ctx.fillStyle = "#a16207"; ctx.fillRect(tx + 3, ty + 3, TILE - 6, TILE - 6);
                        ctx.fillStyle = "#92400e";
                        ctx.fillRect(tx + 3, ty + 3, (TILE - 6) / 2 - 1, TILE - 6);
                        ctx.fillRect(tx + 3 + (TILE - 6) / 2 + 1, ty + 3, (TILE - 6) / 2 - 1, TILE - 6);
                        ctx.fillStyle = "#fbbf24";
                        ctx.beginPath(); ctx.arc(tx + TILE / 2 - 3, ty + TILE / 2, 1.6, 0, Math.PI * 2); ctx.arc(tx + TILE / 2 + 3, ty + TILE / 2, 1.6, 0, Math.PI * 2); ctx.fill();
                    } else {
                        let checker = (r + c) % 2 === 0;
                        ctx.fillStyle = checker ? "#fef3c7" : "#fde9a8";
                        ctx.fillRect(tx, ty, TILE, TILE);
                        ctx.strokeStyle = "rgba(0,0,0,0.05)"; ctx.strokeRect(tx, ty, TILE, TILE);
                    }
                }
                else if (type === 4) {
                    // ÁGUA: ondas duplas + espuma na margem
                    ctx.fillStyle = "#0ea5e9"; ctx.fillRect(tx, ty, TILE, TILE);
                    let w = Math.sin(now / 300 + c + r * 0.3) * 2;
                    ctx.fillStyle = "#38bdf8"; ctx.fillRect(tx + 5, ty + 10 + w, 20, 3);
                    let w2 = Math.sin(now / 260 + c * 1.3 + r) * 2;
                    ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.fillRect(tx + 10, ty + 26 + w2, 14, 2);
                    if (above !== 4) { ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fillRect(tx, ty, TILE, 3); }
                }
            }
        }

        // Elementos naturais espalhados (árvores, arbustos, flores) — apenas dentro da área visível
        const viewL = camX - 60, viewR = camX + canvas.width + 60, viewT = camY - 90, viewB = camY + canvas.height + 60;
        for (const f of FLOWER_PATCHES) if (f.x > viewL && f.x < viewR && f.y > viewT && f.y < viewB) drawFlowerPatch(f, now);
        for (const b of BUSHES) if (b.x > viewL && b.x < viewR && b.y > viewT && b.y < viewB) drawBush(b, now);
        for (const t of TREES) if (!t.big && t.x > viewL && t.x < viewR && t.y > viewT && t.y < viewB) drawTree(t, now);
        for (const t of TREES) if (t.big && t.x > viewL && t.x < viewR && t.y > viewT && t.y < viewB) drawTree(t, now);

        // Decoração própria de cada sala visível
        for (let key in ROOM_INFO) {
            const room = ROOM_INFO[key];
            const rx1 = room.c1 * TILE, rx2 = room.c2 * TILE, ry1 = room.r1 * TILE, ry2 = room.r2 * TILE;
            if (rx2 > camX && rx1 < camX + canvas.width && ry2 > camY && ry1 < camY + canvas.height) drawRoomDecor(key);
        }

        for(let key in npcLocations) {
            drawSign(npcLocations[key].x - 15, npcLocations[key].y - 30, questsData[key].room, questsData[key].icon);
        }

        // Sistema Genérico e Robusto para desenhar múltiplos NPCs alinhados horizontalmente em qualquer quantidade
        for (let key in npcLocations) {
            let loc = npcLocations[key];
            let count = loc.npcs.length;
            let bounce = Math.sin(Date.now() / 200 + loc.x) * 2;
            let spacing = 16;
            let startX = loc.x - ((count - 1) * spacing) / 2;
            
            for (let i = 0; i < count; i++) {
                let n = loc.npcs[i];
                drawCharacter(startX + (i * spacing), loc.y + bounce + (i % 2 * 2), n.skin, n.shirt, n.pants, n.hair, n.hStyle, n.glasses, false);
            }

            if (!questState[key].completed) {
                ctx.fillStyle = "#ffe66d"; ctx.font = "bold 24px Arial"; ctx.fillText("!", loc.x + 8, loc.y - 15 + bounce);
            }
        }

        let bob = (keys.up || keys.down || keys.left || keys.right) ? Math.sin(Date.now() / 80) * 3 : 0;
        drawCharacter(player.x, player.y + bob, "#ffdbac", "#18181b", "#18181b", "#292524", 3, false, true);

        // Fauna aérea por cima de tudo: folhas, borboletas e passarinhos ocasionais
        for (const lf of LEAVES) if (lf.x > viewL && lf.x < viewR && lf.y > viewT && lf.y < viewB) drawLeaf(lf, now);
        for (const bf of BUTTERFLIES) if (bf.x > viewL && bf.x < viewR && bf.y > viewT && bf.y < viewB) drawButterfly(bf, now);
        for (const bd of BIRDS) if (bd.y > viewT && bd.y < viewB) drawBird(bd, now);

        ctx.restore();
    }

    function loop() {
        updatePhysics();
        updateAmbient(Date.now());
        draw();
        requestAnimationFrame(loop);
    }

    function startGame() {
        let name = document.getElementById("player-name").value.trim();
        if(name) player.name = name;
        document.getElementById("hud-name").innerText = player.name;
        
        document.getElementById("start-screen").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("hud").style.display = "flex";
            document.getElementById("tutorial-hud").style.display = "block";
            if (window.innerWidth < 800) document.getElementById("controls").style.display = "flex";
        }, 500);

        initMap();
        generateAmbientDecor();
        setupInput();
        requestAnimationFrame(loop);
    }
</script>
